name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
      with:
        submodules: recursive # Get all sub-modules

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'adopt' # Note: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B test --file pom.xml
