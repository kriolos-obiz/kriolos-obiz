name: Java CI with Maven

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # (ex: v1.0.0)
  pull_request:
    branches: [ main ]

# Permissions on Release can upload files
permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
      with:
        submodules: recursive # Get all sub-modules

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'adopt' # Note: 'temurin' (Eclipse Temurin)
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml


    # Faz o upload de binários específicos para uma Release baseada em Tags (v1.0.0, etc.)
    - name: Upload Binaries to Release
      if: startsWith(github.ref, 'refs/tags/') # Só executa este passo se o trigger for uma Tag
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "Release ${{ github.ref_name }}"
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          application/target/kriolos-obiz-*.zip
